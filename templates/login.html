<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #b71c1c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .login-btn:hover { background-color: #d32f2f; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2 style="color: #b71c1c; margin-bottom: 10px;">🏥 Admin Portal</h2>
        <p style="color: #666; margin-bottom: 25px;">Please sign in to access the database.</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="/patient" style="color: #0d47a1; text-decoration: none; font-size: 14px;">I am a Patient</a>
        </div>
    </div>
</div>

</body>
</html>
